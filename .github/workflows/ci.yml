name: CI
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    uses: status-im/nimbus-common-workflow/.github/workflows/common.yml@main
    with:
      nim-versions: '["version-2-0", "version-2-2", "devel"]'
      nimble-version: aa03f886e4a111d6af9090c6a1f1271d64b66f7b
      test-command: |
        nimble setup -l
        nimble test
